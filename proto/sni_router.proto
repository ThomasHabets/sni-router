syntax = "proto3";

package sni_router;

enum AclAction {
        // Invalid.
        UNSPECIFIED = 0;

        // Drop connection right away.
        DROP = 1;

        // Accept connection.
        ACCEPT = 2;

        // Reject the connection from this rule, but continue to the next Rule.
        CONTINUE = 3;
}

// The first rule that matches wins.
message AclRule {
        // Client address in CIDR format. Supports IPv6 and IPv4.
        string source = 1;

        // If the above matches, then the ACL ends with this `action`.
        AclAction action = 2;
}

message Acl {
        // If no AclRule matches, do this action.
        AclAction default_action = 1;

        // AclRules in order.
        repeated AclRule rules = 2;
}

message Rule {
        // Regex matching SNI (domain). Prefer escaping period, as it otherwise
        // matches any character. E.g.:
        //    (www[.]|)example[.]com
        //
        // The `default` rule must not have a regex specified, since it matches
        // everything not previously matched.
        optional string regex = 1;

        // ACL for the rule. Checked *after* regex, but before anything else.
        Acl acl = 2;

        // Backend and sorry server.
        Backend backend = 3;

        // Max connection lifetime.
        //
        // For Proxy backends this is more real than for Pass backends.
        //
        // For Pass backends it's basically just the `ClientHello` snoop time,
        // unless it's also the TLS handshake time or the unix socket write
        // blocks because the server is full or something. There's no timing out
        // after the FD has been handed off.
        uint64 max_lifetime_ms = 4;
}

message Backend {
        message Tls {
                string cert_file = 1;
                string key_file = 2;
        }
        message Null {
        }
        message Proxy {
                string addr = 1;
                bool proxy_header = 2;
        }
        message Pass {
                string path = 1;
        }
        oneof backend_type {
                Null null = 1;
                Proxy proxy = 2;
                Pass pass = 3;
        }

        // Sorry backend. Used if connecting to the backend fails.
        Backend sorry = 5;

        // Enabling frontend TLS causes the SNI router to complete the handshake
        // with the client.
        //
        // The handshake happens *after* connecting to the backend, for two
        // reasons:
        // 1. Don't waste a handshake if the backend is down.
        // 2. If we fail to connect to the regular backend, the Sorry server may wish to get the connection *without* frontend TLS offloaded.
        //
        // Note that frontend TLS with a null backend is a wasted handshake.
        Tls frontend_tls = 6;
}

message SNIConfig {
        repeated Rule rules = 1;
        Rule default = 2;

        // See comment on field in Rule message.
        // But since this is top level, this applies to waiting for the
        // ClientHello too.
        //
        // No connection (not handed off to Pass) will ever live longer than
        // this.
        uint64 max_lifetime_ms = 3;

        // Timeout for the pre-backend phase: reading enough of the TLS
        // ClientHello to route the connection, then connecting to or handing
        // off to the selected backend.
        //
        // This timeout stops applying once a proxy backend has been connected
        // to, or a pass backend has received the file descriptor.
        //
        // This timeout therefore does NOT include any handshake with the
        // backend, or frontend TLS. That's covered by the global and per rule
        // max_lifetime_ms.
        uint64 handshake_timeout_ms = 4;
}
